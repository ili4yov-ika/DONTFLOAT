name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

# Отменяем устаревшие запуски для той же ветки/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu, Qt ${{ matrix.qt }}, GCC)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        qt: ['6.8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-libav

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        env:
          # Тесты на Qt без дисплея — используем offscreen-платформу
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure --build-config Release

  windows:
    name: Windows (MSVC, Qt ${{ matrix.qt }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        qt: ['6.8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtmultimedia
          cache: true

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config Release
